version: '3.8'

services:
  workflow-studio:
    # ========== 阿里云镜像（国内推荐） ==========
    image: ${ALIYUN_REGISTRY:-registry.cn-wulanchabu.aliyuncs.com}/${ALIYUN_NAMESPACE:-polanpika666}/n8n-web:latest
    # ========== GitHub 镜像（备用） ==========
    # image: ghcr.io/2291932338/n8n-web:latest
    # ========== 本地构建 ==========
    # build: .
    container_name: workflow-studio
    ports:
      - "${PORT:-3000}:80"
    environment:
      # ========== 方式一：统一 n8n 地址（推荐） ==========
      - N8N_BASE_URL=${N8N_BASE_URL:-https://your-n8n-domain.com}

      # ========== 方式二：分别指定每个接口 ==========
      # - START_WORKFLOW_URL=https://n8n.example.com/webhook/start-workflow
      # - STATUS_QUERY_URL=https://n8n.example.com/webhook/query-status
      # - USER_ACTION_URL=https://n8n.example.com/webhook/user-action

      # ========== Mock 模式 ==========
      # 设为 false 连接真实 n8n
      - MOCK_ENABLED=${MOCK_ENABLED:-false}
    restart: unless-stopped
