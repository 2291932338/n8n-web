services:
  workflow-studio:
    image: kouil/n8n-web:${IMAGE_TAG:-latest}
    depends_on:
      - workflow-backend
    ports:
      - "${PORT:-3000}:80"
    restart: unless-stopped

  workflow-backend:
    image: kouil/n8n-web-backend:${IMAGE_TAG:-latest}
    depends_on:
      workflow-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      N8N_TIMEOUT_MS: ${N8N_TIMEOUT_MS:-60000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      XHS_START_WORKFLOW_URL: ${XHS_START_WORKFLOW_URL}
      XHS_STATUS_QUERY_URL: ${XHS_STATUS_QUERY_URL}
      XHS_USER_ACTION_URL: ${XHS_USER_ACTION_URL}
      XHS_REGENERATE_IMAGE_URL: ${XHS_REGENERATE_IMAGE_URL}
      DOUYIN_START_WORKFLOW_URL: ${DOUYIN_START_WORKFLOW_URL}
      DOUYIN_STATUS_QUERY_URL: ${DOUYIN_STATUS_QUERY_URL}
      DOUYIN_DOWNLOAD_URL: ${DOUYIN_DOWNLOAD_URL}
      DOUYIN_USER_ACTION_URL: ${DOUYIN_USER_ACTION_URL}
      DOUYIN_FRAME_ACTION_URL: ${DOUYIN_FRAME_ACTION_URL}
      DOUYIN_GENERATE_VIDEO_URL: ${DOUYIN_GENERATE_VIDEO_URL}
      DOUYIN_REGENERATE_VIDEO_URL: ${DOUYIN_REGENERATE_VIDEO_URL}
    restart: unless-stopped

  workflow-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow_studio}
      POSTGRES_USER: ${POSTGRES_USER:-workflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - workflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workflow_user} -d ${POSTGRES_DB:-workflow_studio}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  workflow_postgres_data:
